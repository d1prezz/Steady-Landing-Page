<!DOCTYPE html>
<html lang="en" class="bg-[#030303] text-slate-200 scroll-smooth selection:bg-indigo-500/30">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steady | Industrial-Grade Discipline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Montserrat:wght@400;500;700;900&display=swap');
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #030303; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }

        body { font-family: 'Inter', sans-serif; cursor: none; }
        
        /* Smooth Custom Cursor */
        #cursor {
            position: fixed; top: 0; left: 0; width: 12px; height: 12px;
            background: #6366f1; border-radius: 50%; pointer-events: none;
            z-index: 9999; transition: transform 0.1s ease;
        }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .float-animation { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Custom Cursor Element -->
    <div id="cursor" class="hidden md:block"></div>

    <nav class="sticky top-0 z-50 glass border-b border-white/5 py-6 px-8 md:px-16 flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter text-white">STEADY</div>
        <div class="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest text-slate-400">
            <a href="#home" class="hover:text-white transition">Home</a>
            <a href="#interface" class="hover:text-white transition">Interface</a>
            <a href="#about" class="hover:text-white transition">About</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-20 md:py-32 grid md:grid-cols-2 gap-16 items-center">
        <div>
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-500/10 text-indigo-400 text-xs font-bold border border-indigo-500/20 mb-6">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span></span>
                v0.5 BETA NOW LIVE
            </div>
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter leading-[0.9] mb-8 bg-gradient-to-br from-white to-slate-500 bg-clip-text text-transparent">
                BEAT THE <br>IMPULSE.
            </h1>
            <p class="text-lg text-slate-400 mb-10 leading-relaxed max-w-md">
                An industrial-grade tool for men committed to breaking free. Built on faith, powered by data, designed for focus.
            </p>
            <div class="flex gap-4">
                <a href="#" class="px-8 py-4 bg-white text-black font-bold rounded-xl hover:bg-slate-200 transition flex items-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i> Get for Android
                </a>
            </div>
        </div>
        <div class="float-animation relative">
            <div class="absolute inset-0 bg-indigo-500/20 blur-[120px] rounded-full"></div>
            <img src="RAH.png" alt="App Preview" class="relative z-10 w-full max-w-sm mx-auto rounded-3xl shadow-2xl border border-white/10">
        </div>
    </main>

    <!-- Script for Cursor & Icons -->
    <script>
        // Cursor Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX - 6}px, ${e.clientY - 6}px)`;
        });

        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
